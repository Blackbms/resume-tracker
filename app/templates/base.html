<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Resume Tracker{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 960px; margin: 40px auto; padding: 0 20px; color: #333; }
        nav { margin-bottom: 24px; }
        nav a { margin-right: 16px; text-decoration: none; color: #0066cc; }
        nav a:hover { text-decoration: underline; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #ddd; }
        th { background: #f4f4f4; }
        th a { color: #0066cc; text-decoration: none; }
        th a:hover { text-decoration: underline; }
        tr:hover { background: #fafafa; }
        .btn { display: inline-block; padding: 8px 16px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 14px; }
        .btn:hover { background: #0052a3; }
        .btn-small { padding: 4px 8px; font-size: 12px; }
        .btn-danger { background: #cc0000; }
        .btn-danger:hover { background: #a30000; }
        .btn-secondary { background: #666; }
        .btn-secondary:hover { background: #444; }
        label { display: block; margin-top: 14px; font-weight: bold; font-size: 14px; }
        input[type=text], input[type=date], input[type=email], input[type=url], select, textarea {
            width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box;
            border: 1px solid #ccc; border-radius: 4px; font-size: 14px;
        }
        textarea { height: 100px; resize: vertical; }
        .form-actions { margin-top: 20px; display: flex; gap: 10px; }
        .status-Applied { color: #0066cc; }
        .status-Referred { color: #6600cc; }
        .status-No\ Response { color: #999; }
        .status-Interview\ Scheduled { color: #cc7700; }
        .status-Interview\ Completed { color: #cc7700; }
        .status-Offer\ Received { color: #007700; font-weight: bold; }
        .status-Rejected { color: #cc0000; }
        .status-Withdrawn { color: #999; }
        h1 { margin-bottom: 8px; }
        .mobile-sort { display: none; }
        .processed-indicator { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border: 2px solid #ddd; border-radius: 4px; font-size: 18px; cursor: pointer; transition: all 0.2s ease; }
        .processed-indicator:hover { border-color: #0066cc; }
        .processed-indicator.unprocessed { border-color: #ddd; color: #999; background: #fafafa; }
        .processed-indicator.unprocessed:hover { background: #f0f0f0; }
        .processed-indicator.processed { border-color: #0066cc; background: #0066cc; color: white; }
        .processed-indicator.processed:hover { background: #0052a3; }
        tr.processed-row { opacity: 0.7; }

        @media (max-width: 600px) {
            .mobile-sort { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
            .mobile-sort label { margin-top: 0; font-weight: bold; font-size: 14px; }
            .mobile-sort select { width: auto; margin-top: 0; }
            body { margin: 16px auto; }
            nav { display: flex; flex-wrap: wrap; gap: 8px; }
            nav a { margin-right: 0; }

            table thead { display: none; }
            table, tbody, tr, td { display: block; width: 100%; box-sizing: border-box; }
            tr { border: 1px solid #ddd; border-radius: 6px; margin-bottom: 12px; padding: 10px; }
            tr:hover { background: none; }
            td { border: none; padding: 3px 0; }
            td::before { content: attr(data-label); font-weight: bold; font-size: 12px; color: #666; display: block; }

            input[type=date] { width: 100%; }
            .form-actions { flex-direction: column; }
            .form-actions .btn { text-align: center; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="{{ url_for('main.index') }}">All Applications</a>
        <a href="{{ url_for('main.add_job') }}">+ Add Application</a>
        <a href="{{ url_for('main.backup_manage') }}">💾 Backup & Restore</a>
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
